<script>
(function() {
    // ========== 配置 ==========
    const SUPABASE_URL = 'https://vleraaavbfokdxjaaheg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsZXJhYWF2YmZva2R4amFhaGVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NTcyNjAsImV4cCI6MjA5OTQzMzI2MH0.sjnWeEucxZrZqVluk5r0lXQdRA_Xs3Rt6XBsdyJuWXM';

    let heartbeatInterval = null;
    let pingInterval = null;

    const usernameInput = document.getElementById('username');

    const closeModalBtn = document.getElementById('closeModalBtn');
    const rememberMeCheckbox = document.getElementById('rememberMe');
    const autoLoginBadge = document.getElementById('autoLoginBadge');

    const ipBlockOverlay = document.getElementById('ipBlockOverlay');
    const blockedIpDisplay = document.getElementById('blockedIpDisplay');
    const blockedLocationDisplay = document.getElementById('blockedLocationDisplay');

    // ========== 隐藏IP函数 ==========
    function maskIP(ip) {
        if (!ip || ip === '检测中...' || ip === '0.0.0.0') return ip;
        const parts = ip.split('.');
        if (parts.length !== 4) return ip;
        return `${parts[0]}.${parts[1]}.***.***`;
    }

    // ========== 多接口备用查询 ==========
    async function queryIPLocation(ip) {
        const apiList = [
            {
                url: 'https://ip.useragentinfo.com/json',
                parse: function(data) {
                    return {
                        country: data.country || '',
                        province: data.province || '',
                        city: data.city || ''
                    };
                }
            },
            {
                url: `https://whois.pconline.com.cn/ipJson.jsp?ip=${ip}&json=true`,
                parse: function(data) {
                    return {
                        country: '中国',
                        province: data.pro || '',
                        city: data.city || ''
                    };
                },
                isText: true
            },
            {
                url: 'https://myip.ipip.net/json',
                parse: function(data) {
                    const locationData = data.data || {};
                    const location = locationData.location || [];
                    return {
                        country: location[0] || '',
                        province: location[1] || '',
                        city: location[2] || ''
                    };
                }
            }
        ];

        for (let i = 0; i < apiList.length; i++) {
            try {
                const api = apiList[i];
                const response = await fetch(api.url, {
                    mode: 'cors',
                    headers: { 'Accept': 'application/json' }
                });
                if (!response.ok) continue;
                let data;
                if (api.isText) {
                    const text = await response.text();
                    data = JSON.parse(text);
                } else {
                    data = await response.json();
                }
                const result = api.parse(data);
                if (!result.province && !result.city) continue;
                return result;
            } catch (error) { /* 继续尝试下一个 */ }
        }
        throw new Error('所有IP查询接口均失败');
    }

    // ========== 获取IP并检测归属地 ==========
    async function getIPAndLocation() {
        try {
            const ipResponse = await fetch('https://api.ip.sb/jsonip', {
                mode: 'cors',
                headers: { 'Accept': 'application/json' }
            });
            if (!ipResponse.ok) throw new Error('获取IP失败');
            const ipData = await ipResponse.json();
            const ip = ipData.ip || '0.0.0.0';
            detectedIP = ip;
            ipSpan.innerHTML = `你的IP：<span style="color:#4a6cf7;font-weight:600;">${ip}</span>`;

            const location = await queryIPLocation(ip);
            const country = location.country || '中国';
            const province = location.province || '';
            const city = location.city || '';

            // 控制台显示IP归属地
            console.log('IP归属地:', country, province, city);
            console.log('IP地址:', ip);
            console.log('是否允许访问:', (country === '中国' || country === 'CN' || country === 'China') && 
                !(province.includes('香港') || province.includes('澳门') || province.includes('台湾') ||
                  city.includes('香港') || city.includes('澳门') || city.includes('台湾') ||
                  country.includes('香港') || country.includes('澳门') || country.includes('台湾')));

            blockedIpDisplay.textContent = ip;
            blockedLocationDisplay.textContent = country + ' ' + province + ' ' + city;

            const isChina = country === '中国' || country === 'CN' || country === 'China';
            const isSpecialRegion = province.includes('香港') || province.includes('澳门') || province.includes('台湾') ||
                                   city.includes('香港') || city.includes('澳门') || city.includes('台湾') ||
                                   country.includes('香港') || country.includes('澳门') || country.includes('台湾');
            const isMainland = isChina && !isSpecialRegion;

            return { ip, country, province, city, isMainland };

        } catch (error) {
            console.warn('IP检测失败:', error);
            blockedIpDisplay.textContent = '查询失败';
            blockedLocationDisplay.textContent = '请刷新重试';
            return { ip: '0.0.0.0', country: '', province: '', city: '', isMainland: true };
        }
    }

    // ========== 主流程 ==========
    async function initApp() {
        const result = await getIPAndLocation();
        if (!result.isMainland) {
            ipBlockOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            return;
        }
        checkAutoLogin();
    }

    // ========== 密码验证 ==========
    function validatePassword(pwd) {
        if (pwd.length < 8 || pwd.length > 12) return false;
        return /\d/.test(pwd) && /[a-zA-Z]/.test(pwd) && /[^a-zA-Z0-9]/.test(pwd);
    }

    // ========== 存储登录信息 ==========
    function saveLoginData(username, password, remember) {
        if (remember) {
            try {
                localStorage.setItem('chat_username', username);
                localStorage.setItem('chat_password', password);
                localStorage.setItem('chat_remember', 'true');
            } catch (e) {}
        } else {
            clearLoginData();
        }
    }

    function clearLoginData() {
        try {
            localStorage.removeItem('chat_username');
            localStorage.removeItem('chat_password');
            localStorage.removeItem('chat_remember');
        } catch (e) {}
    }

    function getSavedLoginData() {
        try {
            return {
                username: localStorage.getItem('chat_username') || '',
                password: localStorage.getItem('chat_password') || '',
                remember: localStorage.getItem('chat_remember') === 'true'
            };
        } catch (e) {
            return { username: '', password: '', remember: false };
        }
    }

    // ========== 设备指纹 ==========
    async function getDeviceFingerprint() {
        try {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            return result.visitorId;
        } catch (e) {
            return 'fallback-' + crypto.randomUUID();
        }
    }

    // ========== 执行登录 ==========
    async function performLogin(username, password, isAuto = false) {
        if (isAuto) {
            isAutoLoggingIn = true;
            autoLoginBadge.style.display = 'inline-block';
            enterBtn.textContent = '自动登录中...';
            enterBtn.disabled = true;
        }

        try {
            if (!deviceFingerprint) {
                deviceFingerprint = await getDeviceFingerprint();
            }

            const currentIP = detectedIP === '检测中...' ? '0.0.0.0' : detectedIP;

            const { data: existingUser, error: userErr } = await _supabase
                .from('users')
                .select('*')
                .eq('username', username)
                .maybeSingle();

            if (userErr) throw userErr;

            if (existingUser) {
                const match = await bcrypt.compare(password, existingUser.password_hash);
                if (!match) throw new Error('密码错误');

                const { error: updateErr } = await _supabase
                    .from('users')
                    .update({ last_login: new Date().toISOString(), ip: currentIP, fingerprint: deviceFingerprint })
                    .eq('id', existingUser.id);

                if (updateErr) {
                    if (updateErr.message.includes('banned')) throw new Error('该设备或IP已被封禁');
                    throw updateErr;
                }
                currentUser = { ...existingUser, ip: currentIP, fingerprint: deviceFingerprint };
            } else {
                const saltRounds = 10;
                const hash = await bcrypt.hash(password, saltRounds);

                const { data: newUser, error: insertErr } = await _supabase
                    .from('users')
                    .insert({ username, password_hash: hash, ip: currentIP, fingerprint: deviceFingerprint })
                    .select()
                    .single();

                if (insertErr) {
                    if (insertErr.message.includes('banned')) throw new Error('该设备或IP已被封禁');
                    if (insertErr.message.includes('duplicate key')) throw new Error('用户名已存在，请直接登录');
                    throw insertErr;
                }
                currentUser = newUser;
            }

            loginPanel.style.display = 'none';
            chatPanel.style.display = 'flex';
            chatPanel.style.flexDirection = 'column';
            chatPanel.style.flex = '1';
            userInfoDiv.textContent = `${currentUser.username} (${currentUser.ip})`;

            startHeartbeat();
            loadMessages();
            loadOnlineUsers();
            subscribeMessages();
            subscribeHeartbeats();
            subscribeBulletin();
            startPing();
            startKeepAlive();

            if (isAuto) {
                autoLoginBadge.textContent = '自动登录成功';
                setTimeout(() => { autoLoginBadge.style.display = 'none'; }, 3000);
            }

        } catch (err) {
            loginError.textContent = err.message;
            loginError.style.color = '#dc2626';
            loginError.style.display = 'block';
            if (isAuto) {
                autoLoginBadge.style.display = 'none';
                enterBtn.textContent = '进入聊天室';
                enterBtn.disabled = false;
                isAutoLoggingIn = false;
                clearLoginData();
            }
            throw err;
        } finally {
            if (isAuto) {
                isAutoLoggingIn = false;
                enterBtn.textContent = '进入聊天室';
                enterBtn.disabled = false;
            }
        }
    }

    // ========== 检查自动登录 ==========
    async function checkAutoLogin() {
        const saved = getSavedLoginData();
        if (saved.remember && saved.username && saved.password) {
            usernameInput.value = saved.username;
            passwordInput.value = saved.password;
            rememberMeCheckbox.checked = true;
            autoLoginBadge.style.display = 'inline-block';
            autoLoginBadge.textContent = '自动登录中...';
            try {
                await performLogin(saved.username, saved.password, true);
            } catch (e) {
                loginError.textContent = '自动登录失败，请手动登录';
                loginError.style.display = 'block';
                enterBtn.disabled = false;
                autoLoginBadge.style.display = 'none';
            }
        } else {
            enterBtn.disabled = false;
            if (saved.username) {
                usernameInput.value = saved.username;
                rememberMeCheckbox.checked = saved.remember;
            }
        }
    }

    // ========== 登录按钮 ==========
    enterBtn.addEventListener('click', async () => {
        if (isAutoLoggingIn) return;

        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!/^[\u4e00-\u9fa5]{1,6}$/.test(username) || username === 'null') {
            loginError.textContent = '名字必须是1-6位汉字，且不能为"null"';
            loginError.style.display = 'block';
            return;
        }
        if (!validatePassword(password)) {
            loginError.textContent = '密码需8-12位，包含数字、字母、特殊字符';
            loginError.style.display = 'block';
            return;
        }

        enterBtn.disabled = true;
        loginError.style.color = '#2563eb';
        loginError.textContent = '登录中...';
        loginError.style.display = 'block';

        try {
            saveLoginData(username, password, rememberMeCheckbox.checked);
            await performLogin(username, password, false);
        } catch (err) {}
        finally {
            enterBtn.disabled = false;
        }
    });

    // ========== 心跳 ==========
    function startHeartbeat() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        const sendHeartbeat = async () => {
            if (!currentUser) return;
            await _supabase.from('heartbeats').upsert({ user_id: currentUser.id, last_seen: new Date().toISOString() });
        };
        sendHeartbeat();
        heartbeatInterval = setInterval(sendHeartbeat, 3000);
    }

    // ========== 保活 ==========
    function startKeepAlive() {
        if (keepAliveInterval) clearInterval(keepAliveInterval);
        const keepAlive = async () => {
            try {
                await _supabase.from('users').select('count', { count: 'exact', head: true });
            } catch (e) {}
        };
        keepAlive();
        keepAliveInterval = setInterval(keepAlive, 4 * 60 * 1000);
    }

    // ========== 在线列表 ==========
    async function loadOnlineUsers() {
        const { data, error } = await _supabase.from('user_online_status').select('*');
        if (error) return;
        onlineUsers = data || [];
        renderOnlineList();
    }

    function subscribeHeartbeats() {
        if (heartbeatsSubscription) heartbeatsSubscription.unsubscribe();
        heartbeatsSubscription = _supabase
            .channel('heartbeats-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'heartbeats' }, () => loadOnlineUsers())
            .subscribe();
    }

    // ========== ✅ 修复：稳定排序，防止用户抢位置 ==========
    function renderOnlineList() {
        if (!onlineUsers.length) {
            onlineList.innerHTML = '<li style="color:#b0b8c5;text-align:center;padding:12px 0;font-size:0.8rem;">暂无用户</li>';
            onlineCountSpan.textContent = '0 在线';
            return;
        }

        // 稳定排序：
        // 1. 在线用户排在前面（online = true）
        // 2. 同状态按 last_seen 升序（越早进入的越靠上，先进入的永远在上面）
        // 3. 如果 last_seen 相同，按用户名排序保证绝对稳定
        const sorted = [...onlineUsers].sort((a, b) => {
            // 优先按在线状态排序
            if (a.online !== b.online) {
                return b.online ? 1 : -1; // 在线优先
            }
            // 同状态按 last_seen 排序（从旧到新 = 先进入的在上方）
            const aTime = a.last_seen || a.created_at || '';
            const bTime = b.last_seen || b.created_at || '';
            if (aTime !== bTime) {
                return aTime < bTime ? -1 : 1;
            }
            // 最后按用户名保证绝对稳定
            return a.username.localeCompare(b.username);
        });

        const onlineCount = sorted.filter(u => u.online).length;
        onlineCountSpan.textContent = `${onlineCount} 在线`;

        const maxDisplay = 30;
        const displayUsers = sorted.slice(0, maxDisplay);
        const hasMore = sorted.length > maxDisplay;

        let html = displayUsers.map(u => {
            const displayIP = maskIP(u.ip || '-');
            return `
                <li class="online-item ${u.online ? 'online' : 'offline'}">
                    <span class="status-dot"></span>
                    <span class="username">${escapeHtml(u.username)}</span>
                    <span class="user-ip">${escapeHtml(displayIP)}</span>
                </li>
            `;
        }).join('');

        if (hasMore) {
            const remain = sorted.length - maxDisplay;
            html += `<li class="online-more">还有 ${remain} 人未显示</li>`;
        }

        onlineList.innerHTML = html;
    }

    // ========== 消息功能 ==========
    async function loadMessages() {
        const { data, error } = await _supabase
            .from('messages')
            .select(`id, content, created_at, user:users ( id, username )`)
            .order('created_at', { ascending: true });
        if (error) return;
        renderMessages(data || []);
    }

    function renderMessages(messages) {
        if (!messages.length) {
            messageList.innerHTML = '<div style="text-align:center;color:#b0b8c5;padding:30px 0;font-size:0.85rem;">暂无消息</div>';
            return;
        }
        const html = messages.map(msg => {
            const time = new Date(msg.created_at).toLocaleString('zh-CN', { hour12: false });
            const isMine = currentUser && msg.user?.id === currentUser.id;
            const deleteBtn = isMine ? `<button class="delete-btn" onclick="window.deleteMessageById('${msg.id}')">删除</button>` : '';
            return `
                <div class="message" data-id="${msg.id}">
                    <div class="message-header">
                        <span class="message-author">${escapeHtml(msg.user?.username || '未知')}</span>
                        <span class="message-meta">
                            <span class="message-time">${time}</span>
                            ${deleteBtn}
                        </span>
                    </div>
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                </div>
            `;
        }).join('');
        messageList.innerHTML = html;
        messageList.scrollTop = messageList.scrollHeight;
    }

    window.deleteMessageById = async function(messageId) {
        if (!currentUser) { showWarning('请先登录'); return; }
        try {
            const { error } = await _supabase.from('messages').delete().eq('id', messageId).eq('user_id', currentUser.id);
            if (error) { showWarning('删除失败：' + error.message); } 
            else { await loadMessages(); showWarning('消息已删除'); }
        } catch (err) { showWarning('删除异常'); }
    };

    function subscribeMessages() {
        if (messagesSubscription) messagesSubscription.unsubscribe();
        messagesSubscription = _supabase
            .channel('messages-changes')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMessages())
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, () => loadMessages())
            .subscribe();
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('input', () => {
        charCount.textContent = `${messageInput.value.length}/200`;
    });
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
    });

    async function sendMessage() {
        if (!currentUser) { showWarning('请先登录'); return; }
        const content = messageInput.value.trim();
        if (!content) { showWarning('请输入消息内容'); return; }
        if (content.length > 200) { showWarning('消息不能超过200字'); return; }
        
        sendBtn.disabled = true;
        const original = content;
        messageInput.value = '';
        charCount.textContent = '0/200';

        try {
            const { error } = await _supabase.from('messages').insert({ user_id: currentUser.id, content: original });
            if (error) {
                showWarning('发送失败：' + error.message);
                messageInput.value = original;
                charCount.textContent = `${original.length}/200`;
            } else {
                await loadMessages();
                messageList.scrollTop = messageList.scrollHeight;
            }
        } catch (err) {
            showWarning('发送异常');
            messageInput.value = original;
            charCount.textContent = `${original.length}/200`;
        } finally {
            sendBtn.disabled = false;
            messageInput.focus();
        }
    }

    function showWarning(text) {
        warningDiv.textContent = text;
        warningDiv.style.display = 'block';
        setTimeout(() => { warningDiv.style.display = 'none'; }, 3000);
    }

    // ========== 公告 ==========
    async function loadBulletin() {
        const { data, error } = await _supabase.from('bulletin').select('content').eq('id', 1).single();
        if (!error) bulletinContent.textContent = data.content;
    }

    function subscribeBulletin() {
        if (bulletinSubscription) bulletinSubscription.unsubscribe();
        bulletinSubscription = _supabase
            .channel('bulletin-changes')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'bulletin' }, payload => {
                bulletinContent.textContent = payload.new.content;
            })
            .subscribe();
        loadBulletin();
    }

    viewBulletinBtn.addEventListener('click', () => {
        bulletinModal.classList.add('active');
        loadBulletin();
    });
    closeModalBtn.addEventListener('click', () => {
        bulletinModal.classList.remove('active');
    });
    window.addEventListener('click', (e) => {
        if (e.target === bulletinModal) bulletinModal.classList.remove('active');
    });

    function startPing() {
        if (pingInterval) clearInterval(pingInterval);
        pingInterval = setInterval(async () => {
            await _supabase.from('users').select('count', { count: 'exact', head: true });
        }, 300000);
    }

    function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return unsafe.replace(/[&<>"]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }

    // ========== 清理 ==========
    window.addEventListener('beforeunload', () => {
        if (messagesSubscription) messagesSubscription.unsubscribe();
        if (heartbeatsSubscription) heartbeatsSubscription.unsubscribe();
        if (bulletinSubscription) bulletinSubscription.unsubscribe();
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        if (pingInterval) clearInterval(pingInterval);
        if (keepAliveInterval) clearInterval(keepAliveInterval);
    });

    // ========== 启动 ==========
    initApp();

})();
</script>
</body>
</html>
