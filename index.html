    <style>

            margin: 0;
        }

</head>
<body>

            </div>

        <!-- 聊天主面板 -->
        <div id="chatPanel" style="display: none; width: 100%;">

                <div class="chat-main">
                    <div class="chat-header">
                        <span class="user-badge" id="userInfo">加载中...</span>

    <script>
(function() {
    // ========== 配置 ==========
    const SUPABASE_URL = 'https://vleraaavbfokdxjaaheg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsZXJhYWF2YmZva2R4amFhaGVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NTcyNjAsImV4cCI6MjA5OTQzMzI2MH0.sjnWeEucxZrZqVluk5r0lXQdRA_Xs3Rt6XBsdyJuWXM';
    
    // ========== 初始化 Supabase ==========
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const bcrypt = dcodeIO.bcrypt;

    // 状态变量
    let currentUser = null;
    let messagesSubscription = null;
    let heartbeatsSubscription = null;
    let bulletinSubscription = null;
    let dailyResetTimer = null;
    let heartbeatInterval = null;
    let pingInterval = null;
    let keepAliveInterval = null;  // 新增：保持连接活跃的定时器
    let onlineUsers = [];
    let deviceFingerprint = null;
    let isAutoLoggingIn = false;

    // DOM 元素
    const loginPanel = document.getElementById('loginPanel');
    const chatPanel = document.getElementById('chatPanel');
    const ipSpan = document.getElementById('ipDisplay');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const enterBtn = document.getElementById('enterBtn');
    const loginError = document.getElementById('loginError');
    const userInfoDiv = document.getElementById('userInfo');
    const messageList = document.getElementById('messageList');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const charCount = document.getElementById('charCount');
    const warningDiv = document.getElementById('warningMessage');
    const timeReminder = document.getElementById('timeReminder');
    const onlineList = document.getElementById('onlineList');
    const onlineCountSpan = document.getElementById('onlineCount');
    const viewBulletinBtn = document.getElementById('viewBulletinBtn');
    const bulletinModal = document.getElementById('bulletinModal');
    const bulletinContent = document.getElementById('bulletinContent');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const rememberMeCheckbox = document.getElementById('rememberMe');
    const autoLoginBadge = document.getElementById('autoLoginBadge');

    // ========== 存储登录信息 ==========
    function saveLoginData(username, password, remember) {
        if (remember) {
            try {
                localStorage.setItem('chat_username', username);
                localStorage.setItem('chat_password', password);
                localStorage.setItem('chat_remember', 'true');
            } catch (e) {
                console.warn('保存登录信息失败', e);
            }
        } else {
            clearLoginData();
        }
    }

    function clearLoginData() {
        try {
            localStorage.removeItem('chat_username');
            localStorage.removeItem('chat_password');
            localStorage.removeItem('chat_remember');
        } catch (e) {
            console.warn('清除登录信息失败', e);
        }
    }

    function getSavedLoginData() {
        try {
            const username = localStorage.getItem('chat_username') || '';
            const password = localStorage.getItem('chat_password') || '';
            const remember = localStorage.getItem('chat_remember') === 'true';
            return { username, password, remember };
        } catch (e) {
            return { username: '', password: '', remember: false };
        }
    }

    // ========== 生成设备指纹 ==========
    async function getDeviceFingerprint() {
        try {
            const fp = await FingerprintJS.load();
            const result = await fp.get();
            return result.visitorId;
        } catch (e) {
            console.warn('指纹生成失败，使用备用ID', e);
            return 'fallback-' + crypto.randomUUID();
        }
    }

    // ========== IP 检测 ==========
    async function detectIP() {
        try {
            const response = await fetch('https://api.ip.sb/jsonip', { 
                mode: 'cors',
                headers: { 'Accept': 'application/json' }
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data && data.ip) return data.ip;
            throw new Error('无效响应格式');
        } catch (e) {
            console.warn('ip.sb 检测失败', e);
            return '0.0.0.0';
        }
    }

    let detectedIP = '检测中...';
    detectIP().then(ip => {
        detectedIP = ip;
        ipSpan.innerHTML = `你的IP：<span style="color:#2563eb;">${ip}</span>`;
        checkAutoLogin();
    }).catch(() => {
        detectedIP = '0.0.0.0';
        ipSpan.innerHTML = '无法检测IP，将使用 0.0.0.0';
        checkAutoLogin();
    });

    // ========== 密码复杂度验证 ==========
    function validatePassword(pwd) {
        if (pwd.length < 8 || pwd.length > 12) return false;
        const hasDigit = /\d/.test(pwd);
        const hasLetter = /[a-zA-Z]/.test(pwd);
        const hasSpecial = /[^a-zA-Z0-9]/.test(pwd);
        return hasDigit && hasLetter && hasSpecial;
    }

    // ========== 执行登录（可被自动登录调用） ==========
    async function performLogin(username, password, isAuto = false) {
        if (isAuto) {
            isAutoLoggingIn = true;
            autoLoginBadge.style.display = 'inline-block';
            enterBtn.textContent = '自动登录中...';
            enterBtn.disabled = true;
        }

        try {
            if (!deviceFingerprint) {
                deviceFingerprint = await getDeviceFingerprint();
            }

            if (detectedIP === '检测中...') {
                let waitCount = 0;
                while (detectedIP === '检测中...' && waitCount < 10) {
                    await new Promise(r => setTimeout(r, 100));
                    waitCount++;
                }
            }
            const currentIP = (detectedIP === '检测中...' || detectedIP === '未知') ? '0.0.0.0' : detectedIP;

            const { data: existingUser, error: userErr } = await _supabase
                .from('users')
                .select('*')
                .eq('username', username)
                .maybeSingle();

            if (userErr) throw userErr;

            if (existingUser) {
                const match = await bcrypt.compare(password, existingUser.password_hash);
                if (!match) throw new Error('密码错误');

                const { error: updateErr } = await _supabase
                    .from('users')
                    .update({ 
                        last_login: new Date().toISOString(), 
                        ip: currentIP,
                        fingerprint: deviceFingerprint
                    })
                    .eq('id', existingUser.id);

                if (updateErr) {
                    if (updateErr.message.includes('Device fingerprint is banned')) {
                        throw new Error('该设备已被封禁，无法登录');
                    } else if (updateErr.message.includes('IP is banned')) {
                        throw new Error('该IP已被封禁');
                    } else {
                        throw updateErr;
                    }
                }
                currentUser = { ...existingUser, ip: currentIP, fingerprint: deviceFingerprint };
            } else {
                const saltRounds = 10;
                const hash = await bcrypt.hash(password, saltRounds);

                const { data: newUser, error: insertErr } = await _supabase
                    .from('users')
                    .insert({ 
                        username, 
                        password_hash: hash, 
                        ip: currentIP,
                        fingerprint: deviceFingerprint 
                    })
                    .select()
                    .single();

                if (insertErr) {
                    if (insertErr.message.includes('Device fingerprint is banned')) {
                        throw new Error('该设备已被封禁，无法注册');
                    } else if (insertErr.message.includes('IP is banned')) {
                        throw new Error('该IP已被封禁');
                    } else if (insertErr.message.includes('duplicate key')) {
                        throw new Error('用户名已存在，请直接登录');
                    } else {
                        throw insertErr;
                    }
                }
                currentUser = newUser;
            }

            // 登录成功
            loginPanel.style.display = 'none';
            chatPanel.style.display = 'block';
            userInfoDiv.textContent = `👤 ${currentUser.username} (${currentUser.ip})`;

            // 启动各项功能
            startHeartbeat();
            loadMessages();
            loadOnlineUsers();
            subscribeMessages();
            subscribeHeartbeats();
            subscribeBulletin();
            startPing();
            startKeepAlive();  // 启动保活

            if (isAuto) {
                autoLoginBadge.textContent = '自动登录成功';
                setTimeout(() => {
                    autoLoginBadge.style.display = 'none';
                }, 3000);
            }

        } catch (err) {
            loginError.textContent = err.message;
            loginError.style.color = '#dc2626';
            loginError.style.display = 'block';
            if (isAuto) {
                autoLoginBadge.style.display = 'none';
                enterBtn.textContent = '进入聊天室';
                enterBtn.disabled = false;
                isAutoLoggingIn = false;
                // 自动登录失败，清除保存的密码
                clearLoginData();
            }
            throw err;
        } finally {
            if (isAuto) {
                isAutoLoggingIn = false;
                enterBtn.textContent = '进入聊天室';
                enterBtn.disabled = false;
            }
        }
    }

    // ========== 检查自动登录 ==========
    async function checkAutoLogin() {
        const saved = getSavedLoginData();
        if (saved.remember && saved.username && saved.password) {
            usernameInput.value = saved.username;
            passwordInput.value = saved.password;
            rememberMeCheckbox.checked = true;
            autoLoginBadge.style.display = 'inline-block';
            autoLoginBadge.textContent = '自动登录中...';
            
            try {
                await performLogin(saved.username, saved.password, true);
            } catch (e) {
                // 自动登录失败，显示登录界面
                loginError.textContent = '自动登录失败，请手动登录';
                loginError.style.display = 'block';
                enterBtn.disabled = false;
                autoLoginBadge.style.display = 'none';
            }
        } else {
            enterBtn.disabled = false;
            // 如果有保存的用户名，填充但需要手动输入密码
            if (saved.username) {
                usernameInput.value = saved.username;
                rememberMeCheckbox.checked = saved.remember;
            }
        }
    }

    // ========== 登录按钮点击事件 ==========
    enterBtn.addEventListener('click', async () => {
        // 如果正在自动登录，阻止重复点击
        if (isAutoLoggingIn) return;

        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (!/^[\u4e00-\u9fa5]{1,6}$/.test(username) || username === 'null') {
            loginError.textContent = '名字必须是1-6位汉字，且不能为"null"';
            loginError.style.display = 'block';
            return;
        }
        if (!validatePassword(password)) {
            loginError.textContent = '密码需8-12位，包含数字、字母、特殊字符';
            loginError.style.display = 'block';
            return;
        }

        enterBtn.disabled = true;
        loginError.style.color = '#2563eb';
        loginError.textContent = '登录中...';
        loginError.style.display = 'block';

        try {
            // 保存登录信息（如果勾选了记住我）
            saveLoginData(username, password, rememberMeCheckbox.checked);
            await performLogin(username, password, false);
        } catch (err) {
            // 错误已在 performLogin 中显示
        } finally {
            enterBtn.disabled = false;
        }
    });

    // ========== 心跳 ==========
    function startHeartbeat() {
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        const sendHeartbeat = async () => {
            if (!currentUser) return;
            await _supabase
                .from('heartbeats')
                .upsert({ user_id: currentUser.id, last_seen: new Date().toISOString() });
        };
        sendHeartbeat();
        heartbeatInterval = setInterval(sendHeartbeat, 3000);
    }

    // ========== 保活功能 - 防止服务器/后端休眠 ==========
    function startKeepAlive() {
        if (keepAliveInterval) clearInterval(keepAliveInterval);
        
        const keepAlive = async () => {
            try {
                // 发送一个轻量级请求保持连接活跃
                await _supabase.from('users').select('count', { count: 'exact', head: true });
                console.log('💓 Keep-alive ping sent at', new Date().toLocaleTimeString());
            } catch (e) {
                console.warn('Keep-alive ping failed:', e.message);
            }
        };
        
        // 立即执行一次
        keepAlive();
        // 每 4 分钟执行一次（防止 Supabase 或后端休眠）
        keepAliveInterval = setInterval(keepAlive, 4 * 60 * 1000);
    }

    // ========== 在线列表 ==========
    async function loadOnlineUsers() {
        const { data, error } = await _supabase
            .from('user_online_status')
            .select('*');
        if (error) { console.error(error); return; }
        onlineUsers = data || [];
        renderOnlineList();
    }

    function subscribeHeartbeats() {
        if (heartbeatsSubscription) heartbeatsSubscription.unsubscribe();
        heartbeatsSubscription = _supabase
            .channel('heartbeats-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'heartbeats' }, () => {
                loadOnlineUsers();
            })
            .subscribe();
    }

    function renderOnlineList() {
        if (!onlineUsers.length) {
            onlineList.innerHTML = '<li style="color:#94a3b8; text-align:center;">暂无用户</li>';
            onlineCountSpan.textContent = '0 在线';
            return;
        }
        const sorted = [...onlineUsers].sort((a, b) => (b.online ? 1 : 0) - (a.online ? 1 : 0));
        const onlineCount = sorted.filter(u => u.online).length;
        onlineCountSpan.textContent = `${onlineCount} 在线`;

        const html = sorted.map(u => `
            <li class="online-item ${u.online ? 'online' : 'offline'}">
                <span class="status-dot"></span>
                <span class="username">${escapeHtml(u.username)}</span>
                <span class="user-ip">${u.ip}</span>
            </li>
        `).join('');
        onlineList.innerHTML = html;
    }

    // ========== 消息功能 ==========
    async function loadMessages() {
        const { data, error } = await _supabase
            .from('messages')
            .select(`
                id,
                content,
                created_at,
                user:users ( id, username )
            `)
            .order('created_at', { ascending: true });
        if (error) { 
            console.error('加载消息失败:', error); 
            return; 
        }
        renderMessages(data || []);
    }

    function renderMessages(messages) {
        if (!messages.length) {
            messageList.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:40px;">暂无消息</div>';
            return;
        }
        const html = messages.map(msg => {
            const time = new Date(msg.created_at).toLocaleString('zh-CN', { hour12: false });
            const isMine = currentUser && msg.user?.id === currentUser.id;
            return `
                <div class="message" data-id="${msg.id}">
                    <div class="message-header">
                        <span class="message-author">${escapeHtml(msg.user?.username || '未知')}</span>
                        <span class="message-time">${time}</span>
                    </div>
                    <div class="message-content">${escapeHtml(msg.content)}</div>
                    ${isMine ? '<button class="delete-btn" onclick="window.deleteMessageById(\'' + msg.id + '\')">🗑️</button>' : ''}
                </div>
            `;
        }).join('');
        messageList.innerHTML = html;
        messageList.scrollTop = messageList.scrollHeight;
    }

    window.deleteMessageById = async function(messageId) {
        if (!currentUser) {
            showWarning('请先登录');
            return;
        }
        try {
            const { error } = await _supabase
                .from('messages')
                .delete()
                .eq('id', messageId)
                .eq('user_id', currentUser.id);
            
            if (error) {
                showWarning('删除失败：' + error.message);
            } else {
                await loadMessages();
                showWarning('消息已删除');
            }
        } catch (err) {
            console.error('删除异常:', err);
            showWarning('删除异常');
        }
    };

    window.deleteMessage = window.deleteMessageById;

    function subscribeMessages() {
        if (messagesSubscription) messagesSubscription.unsubscribe();
        messagesSubscription = _supabase
            .channel('messages-changes')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => {
                loadMessages();
            })
            .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, () => {
                loadMessages();
            })
            .subscribe();
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('input', () => {
        charCount.textContent = `${messageInput.value.length}/200`;
    });
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });

    async function sendMessage() {
        if (!currentUser) {
            showWarning('请先登录');
            return;
        }
        const content = messageInput.value.trim();
        if (!content) {
            showWarning('请输入消息内容');
            return;
        }
        if (content.length > 200) {
            showWarning('消息不能超过200字');
            return;
        }
        
        sendBtn.disabled = true;
        const original = content;
        messageInput.value = '';
        charCount.textContent = '0/200';

        try {
            const { data, error } = await _supabase
                .from('messages')
                .insert({ user_id: currentUser.id, content: original })
                .select();
            
            if (error) {
                if (error.message.includes('IP is banned') || error.message.includes('fingerprint is banned')) {
                    showWarning('您的设备或IP已被封禁，消息未发送');
                } else {
                    showWarning('发送失败：' + error.message);
                }
                messageInput.value = original;
                charCount.textContent = `${original.length}/200`;
            } else {
                await loadMessages();
                messageList.scrollTop = messageList.scrollHeight;
            }
        } catch (err) {
            console.error('发送异常:', err);
            showWarning('发送异常');
            messageInput.value = original;
            charCount.textContent = `${original.length}/200`;
        } finally {
            sendBtn.disabled = false;
            messageInput.focus();
        }
    }

    function showWarning(text) {
        warningDiv.textContent = text;
        warningDiv.style.display = 'block';
        setTimeout(() => { warningDiv.style.display = 'none'; }, 3000);
    }

    // ========== 公告功能 ==========
    async function loadBulletin() {
        const { data, error } = await _supabase
            .from('bulletin')
            .select('content')
            .eq('id', 1)
            .single();
        if (error) console.error(error);
        else bulletinContent.textContent = data.content;
    }

    function subscribeBulletin() {
        if (bulletinSubscription) bulletinSubscription.unsubscribe();
        bulletinSubscription = _supabase
            .channel('bulletin-changes')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'bulletin' }, payload => {
                bulletinContent.textContent = payload.new.content;
            })
            .subscribe();
        loadBulletin();
    }

    viewBulletinBtn.addEventListener('click', () => {
        bulletinModal.classList.add('active');
        loadBulletin();
    });
    closeModalBtn.addEventListener('click', () => {
        bulletinModal.classList.remove('active');
    });
    window.addEventListener('click', (e) => {
        if (e.target === bulletinModal) bulletinModal.classList.remove('active');
    });

    function startPing() {
        if (pingInterval) clearInterval(pingInterval);
        pingInterval = setInterval(async () => {
            await _supabase.from('users').select('count', { count: 'exact', head: true });
        }, 300000);
    }

    function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return unsafe.replace(/[&<>"]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }

    // ========== 清理资源 ==========
    window.addEventListener('beforeunload', () => {
        if (messagesSubscription) messagesSubscription.unsubscribe();
        if (heartbeatsSubscription) heartbeatsSubscription.unsubscribe();
        if (bulletinSubscription) bulletinSubscription.unsubscribe();
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        if (dailyResetTimer) clearInterval(dailyResetTimer);
        if (pingInterval) clearInterval(pingInterval);
        if (keepAliveInterval) clearInterval(keepAliveInterval);
    });
})();

     </script>    
</body>
